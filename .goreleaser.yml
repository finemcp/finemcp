# Docker images
dockers:
  - image_templates:
      - "ghcr.io/finemcp/finemcp:{{ .Tag }}-amd64"
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}-amd64"
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/finemcp/finemcp:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--label=org.opencontainers.image.description=Production-grade MCP framework for Go"
      - "--label=org.opencontainers.image.licenses=MIT"

  - image_templates:
      - "ghcr.io/finemcp/finemcp:{{ .Tag }}-arm64"
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}-arm64"
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}.{{ .Minor }}-arm64"
      - "ghcr.io/finemcp/finemcp:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--label=org.opencontainers.image.description=Production-grade MCP framework for Go"
      - "--label=org.opencontainers.image.licenses=MIT"

# Docker manifest for multi-arch support
docker_manifests:
  - name_template: "ghcr.io/finemcp/finemcp:{{ .Tag }}"
    image_templates:
      - "ghcr.io/finemcp/finemcp:{{ .Tag }}-amd64"
      - "ghcr.io/finemcp/finemcp:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/finemcp/finemcp:v{{ .Major }}"
    image_templates:
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}-amd64"
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}-arm64"

  - name_template: "ghcr.io/finemcp/finemcp:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/finemcp/finemcp:v{{ .Major }}.{{ .Minor }}-arm64"

  - name_template: "ghcr.io/finemcp/finemcp:latest"
    image_templates:
      - "ghcr.io/finemcp/finemcp:latest-amd64"
      - "ghcr.io/finemcp/finemcp:latest-arm64"

# Snapshot configuration (for testing releases locally)
snapshot:
  name_template: "{{ incpatch .Version }}-next"

